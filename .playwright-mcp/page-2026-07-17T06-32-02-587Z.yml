            - heading "Managing the watsonx.ai Runtime service endpoint" [level=1] [ref=e228]
            - generic [ref=e229]:
              - generic [ref=e230]: Last Updated
              - text: ": 2026-05-22"
            - paragraph [ref=e231]: You can use IBM Cloud connectivity options for accessing cloud services securely by using service endpoints. When you provision a watsonx.ai Runtime service instance, you can choose if you want to access your service through the public internet, which is the default setting, or over the IBM Cloud private network.
            - paragraph [ref=e232]: How you access service endpoints depends on the Cloud platform you are using.
            - generic [ref=e233]:
              - heading "Accessing endpoints on IBM Cloud" [level=2] [ref=e234]
              - paragraph [ref=e235]: "You can use the Service provisioning page to choose a default endpoint from the following options:"
              - list [ref=e236]:
                - listitem [ref=e237]:
                  - text: –
                  - link "Public network" [ref=e238] [cursor=pointer]:
                    - /url: "#public_net"
                - listitem [ref=e239]:
                  - text: –
                  - link "Private network" [ref=e240] [cursor=pointer]:
                    - /url: "#private_net"
                - listitem [ref=e241]: – Both, public and private networks
              - paragraph [ref=e242]:
                - text: For more information, refer to
                - link "IBM Cloud service endpoints" [ref=e243] [cursor=pointer]:
                  - /url: https://cloud.ibm.com/docs/account?topic=account-vrf-service-endpoint
                - text: .
            - generic [ref=e244]:
              - heading "Public network" [level=2] [ref=e245]
              - paragraph [ref=e246]: You can use public network endpoints to connect to watsonx.ai Runtime service instance on the public network. Your environment needs to have internet access to connect.
            - generic [ref=e247]:
              - heading "Private network" [level=2] [ref=e248]
              - paragraph [ref=e249]: You can use private network endpoints to connect to your IBM watsonx.ai Runtime service instance over the IBM Cloud Private network. After you configure your watsonx.ai Runtime service to use private endpoints, the service is not accessible from the public internet.
              - generic [ref=e250]:
                - heading "Private URLs for watsonx.ai Runtime" [level=3] [ref=e251]
                - paragraph [ref=e252]: "Private URLs for watsonx.ai Runtime for each region are as follows:"
