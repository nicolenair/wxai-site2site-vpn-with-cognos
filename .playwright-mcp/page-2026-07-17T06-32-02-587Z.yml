              - generic [ref=e316]:
                - heading "Provisioning a service endpoint (Sydney and Toronto)" [level=3] [ref=e317]
                - paragraph [ref=e318]: To provision a service endpoint for a watsonx.ai Runtime instance in either the Sydney or Toronto region, you must request access to a Private Catalog. After the request is approved, you can share the endpoint as a Virtual Private Endpoint.
                - generic [ref=e319]:
                  - heading "Requesting access to a private catalog" [level=4] [ref=e320]
                  - paragraph [ref=e321]: "To request access to a Private Catalog, follow these steps:"
                  - list [ref=e322]:
                    - listitem [ref=e323]:
                      - text: Use
                      - link "IBM Cloud CLI" [ref=e324] [cursor=pointer]:
                        - /url: https://cloud.ibm.com/docs/cli?topic=cli-getting-started
                      - text: to enable your account to use IBM Cloud service endpoints.
                    - listitem [ref=e325]: Contact IBM Support and submit a request, asking the watsonx.ai Runtime team provide you with access to a Private Catalog. You must supply your IBM Cloud accountID with the request.
                    - listitem [ref=e326]:
                      - text: When the watsonx.ai Runtime team provides access to the Private Catalog to customers account ID, you can view the completed request and catalog details from
                      - strong [ref=e327]: Manage>Catalogs>Share requests
                      - text: in the IBM Cloud console. You can then create a virtual private endpoint gateway.
                    - listitem [ref=e328]:
                      - text: "Select Virtual Private Endpoint as the catalog type. For example:"
                      - img "Sharing a request from the IBM Cloud console" [ref=e329]
                    - listitem [ref=e330]:
                      - text: Follow the steps to create a
                      - link "Virtual private endpoint gateways for VPC" [ref=e331] [cursor=pointer]:
                        - /url: https://cloud.ibm.com/infrastructure/network/endpointGateways
                      - text: ". Use the following as the Private Catalog display names for the Sydney and Toronto data centers:"
                      - list [ref=e332]:
                        - listitem [ref=e333]: "▪ SYDNEY : mcsp-wml-sydprod"
                        - listitem [ref=e334]: "▪ TORONTO : mcsp-wml-torprod"
                - generic [ref=e335]:
                  - heading "Reviewing a share request" [level=4] [ref=e336]
                  - paragraph [ref=e337]: "To review the share request from the IBM Cloud CLI, use the following command:"
