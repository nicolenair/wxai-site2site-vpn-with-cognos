                  - text: To configure the endpoints of your IBM watsonx.ai Runtime service instance, you can use the
                  - strong [ref=e275]: Endpoints
                  - text: field on the IBM Cloud catalog page. You can configure a public, private, or a mixed network.
                - paragraph [ref=e276]:
                  - img "Configure endpoint from the service catalog" [ref=e277]
              - generic [ref=e278]:
                - heading "IBM Cloud CLI" [level=3] [ref=e279]
